<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>South America 2025 Itinerary</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap)');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-slide-up { animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <script>
        const tripData = {
            title: "South America Expedition",
            dates: "Nov 23 – Dec 14",
            days: [
                {
                    tabName: "Nov 25", dateText: "Nov 25: Machu Picchu", country: "Peru", icon: "🇵🇪",
                    acc: { 
                        outName: "Cusco Airbnb", outLink: "",
                        inName: "Cusco Airbnb", inLink: "" 
                    },
                    events: [
                        { time: "05:10", commute: "Train/Bus 🚆", transitNo: "Bimodal", title: "Journey Start", desc: "Start time for the Bimodal service." },
                        { time: "05:30", commute: "Bus 🚌", title: "Bus Up", desc: "Bus to Machu Picchu operates 05:30 - 15:30." },
                        { time: "17:30", commute: "Bus 🚌", title: "Drop Bus", desc: "Return bus operates 06:00 - 17:30." }
                    ]
                },
                {
                    tabName: "Nov 27", dateText: "Nov 27: Transit to Bolivia", country: "Peru → BO", icon: "🇵🇪 / 🇧🇴",
                    acc: { 
                        outName: "Cusco Airbnb", outLink: "",
                        inName: "Trans Salvador Bus", inLink: "" 
                    },
                    events: [
                        { time: "22:00", commute: "Bus 🚌", transitNo: "Overnight", title: "Depart Cusco", desc: "Overnight bus departs for La Paz." }
                    ]
                },
                {
                    tabName: "Nov 28", dateText: "Nov 28: Arrival in La Paz", country: "Bolivia", icon: "🇧🇴",
                    acc: { 
                        outName: "Trans Salvador Bus", outLink: "", 
                        inName: "Hotel Rosario La Paz", inLink: ""
                    },
                    events: [
                        { time: "13:00", commute: "Bus 🚌", title: "Arrive in La Paz", desc: "Approximate arrival time." },
                        { time: "Aft", title: "Check-in", desc: "Settle into Hotel Rosario La Paz." } 
                    ]
                },
                {
                    tabName: "Nov 29", dateText: "Nov 29: Uyuni Salt Flats", country: "Bolivia", icon: "🇧🇴",
                    acc: { 
                        outName: "Hotel Rosario La Paz", outLink: "", 
                        inName: "Uyuni Accommodation", inLink: ""
                    },
                    events: [
                        { time: "Morn", commute: "Flight ✈️", title: "Flight to Uyuni", desc: "Domestic flight to the salt flats." },
                        { time: "10:00", title: "Uyuni Tour Begins", desc: "Start of the 3-Days Tour to the Uyuni Salt Flat." }
                    ]
                },
                {
                    tabName: "Dec 2", dateText: "Dec 2: Buenos Aires Bound", country: "BO → AR", icon: "🇧🇴 / 🇦🇷",
                    acc: { 
                        outName: "Uyuni", outLink: "", 
                        inName: "Posadas de las aguilas", inLink: ""
                    },
                    events: [
                        { time: "Morn", commute: "Flight ✈️", title: "Return to La Paz", desc: "Flight back from Uyuni." },
                        { time: "Day", commute: "Flight ✈️", title: "Flight to EZE", desc: "Connecting flight through VVI to Buenos Aires." },
                        { time: "Night", title: "Check-in", desc: "Rest at Posadas de las aguilas." }
                    ]
                },
                {
                    tabName: "Dec 3", dateText: "Dec 3: Exploring BA", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "Posadas de las aguilas", outLink: "", 
                        inName: "Bromelia Hotel Boutique", inLink: ""
                    },
                    events: [
                        { time: "15:00", title: "Check-in", desc: "Move to Bromelia Hotel Boutique in the city." }
                    ]
                },
                {
                    tabName: "Dec 5", dateText: "Dec 5: Patagonia", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "Bromelia Hotel Boutique", outLink: "", 
                        inName: "Tierra Tahuelche", inLink: ""
                    },
                    events: [
                        { time: "11:00", title: "Checkout", desc: "Leave Bromelia Hotel Boutique." },
                        { time: "16:00", commute: "Flight ✈️", transitNo: "FO 5554", title: "Fly to El Calafate", desc: "Flybondi flight departs." },
                        { time: "19:15", title: "Arrival", desc: "Land in FTE and check into Tierra Tahuelche." }
                    ]
                },
                {
                    tabName: "Dec 6", dateText: "Dec 6: Big Ice Trek", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "Tierra Tahuelche", outLink: "", 
                        inName: "Tierra Tahuelche", inLink: "" 
                    },
                    events: [
                        { time: "07:00", commute: "Tour Bus 🚌", title: "Big Ice Excursion", desc: "Pick up directly from your hotel." }
                    ]
                },
                {
                    tabName: "Dec 7", dateText: "Dec 7: El Chalten", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "Tierra Tahuelche", outLink: "", 
                        inName: "El Chalten Accommodation", inLink: ""
                    },
                    events: [
                        { time: "Day", title: "Relocate", desc: "Travel to El Chalten for a two-night stay." } 
                    ]
                },
                {
                    tabName: "Dec 9", dateText: "Dec 9: El Calafate Return", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "El Chalten Accommodation", outLink: "", 
                        inName: "Aikendor Hotel Panoramico", inLink: ""
                    },
                    events: [
                        { time: "Day", title: "Return Journey", desc: "Head back to El Calafate and check in." }
                    ]
                },
                {
                    tabName: "Dec 10", dateText: "Dec 10: Iguazu Falls", country: "Argentina", icon: "🇦🇷",
                    acc: { 
                        outName: "Aikendor Hotel Panoramico", outLink: "", 
                        inName: "Uru Apart Iguazu", inLink: ""
                    },
                    events: [
                        { time: "Day", commute: "Flight ✈️", title: "Fly to IGR", desc: "Flight from El Calafate to Iguazu." },
                        { time: "Aft", title: "Check-in", desc: "Settle into Uru Apart Iguazu." } 
                    ]
                },
                {
                    tabName: "Dec 12", dateText: "Dec 12: Sao Paulo", country: "AR → BR", icon: "🇦🇷 / 🇧🇷",
                    acc: { 
                        outName: "Uru Apart Iguazu", outLink: "", 
                        inName: "Laghetto Stilo Sao Paulo", inLink: ""
                    },
                    events: [
                        { time: "Day", commute: "Flight ✈️", title: "Fly to GRU", desc: "Cross into Brazil." },
                        { time: "Aft", title: "Check-in", desc: "Check into Laghetto Stilo Sao Paulo." } 
                    ]
                },
                {
                    tabName: "Dec 13", dateText: "Dec 13: Journey Home", country: "BR → HK", icon: "🇧🇷 / 🇭🇰",
                    acc: { 
                        outName: "Laghetto Stilo Sao Paulo", outLink: "", 
                        inName: "In Transit", inLink: "" 
                    },
                    events: [
                        { time: "18:00", commute: "Flight ✈️", transitNo: "LA8072", title: "Depart GRU", desc: "LATAM flight departs for Milan." },
                        { time: "09:15 (+1)", commute: "Flight ✈️", transitNo: "CX234", title: "Connection", desc: "Connect in MXP for Cathay Pacific flight home." }
                    ]
                }
            ]
        };
    </script>

    <header class="bg-white px-6 pt-12 pb-4 shrink-0 border-b border-slate-200 z-50">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1" id="display-dates"></p>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight" id="display-title"></h1>
            </div>
            <div class="flex flex-col items-center justify-center">
                <div class="relative w-10 h-10">
                    <svg class="w-10 h-10 transform -rotate-90">
                        <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-100" />
                        <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-900 transition-all duration-1000 ease-out" id="progress-circle" stroke-dasharray="100" stroke-dashoffset="100" />
                    </svg>
                    <span class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-900" id="progress-text"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 shrink-0">
        <nav class="flex overflow-x-auto px-4 py-3 space-x-2 no-scrollbar" id="tabs-container"></nav>
    </div>

    <main class="flex-grow px-4 py-6 bg-slate-50 pb-32" id="itinerary-content"></main>

    <script>
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;

        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('itinerary-content');

        function renderTabs() {
            tabsContainer.innerHTML = tripData.days.map((day, index) => `
                <button onclick="showDay(${index})" id="tab-${index}" class="px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all duration-200 flex items-center space-x-2 focus:outline-none border border-transparent">
                    <span class="text-lg">${day.icon}</span>
                    <span>${day.tabName}</span>
                </button>
            `).join('');
        }

        function showDay(dayIndex) {
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) {
                    tab.classList.replace('text-slate-500', 'text-white');
                    tab.classList.add('bg-slate-900', 'shadow-md');
                    tab.classList.remove('hover:bg-slate-200', 'bg-transparent');
                } else {
                    tab.classList.remove('bg-slate-900', 'text-white', 'shadow-md');
                    tab.classList.add('bg-transparent', 'text-slate-500', 'hover:bg-slate-200');
                }
            });

            const day = tripData.days[dayIndex];
            
            const isSameHotel = day.acc.outName === day.acc.inName;
            const topAccHTML = isSameHotel 
                ? `<div class="flex items-center gap-3">
                     <span class="text-blue-500 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Stay</span>
                     <a href="${day.acc.inLink || '#'}" target="_blank" class="font-bold text-slate-800 hover:text-blue-600 truncate">${day.acc.inName}</a>
                   </div>`
                : `<div class="flex flex-col gap-2.5">
                     <div class="flex items-center gap-3">
                       <span class="text-slate-400 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Check Out</span>
                       <a href="${day.acc.outLink || '#'}" target="_blank" class="font-bold text-slate-600 hover:text-blue-600 truncate">${day.acc.outName}</a>
                     </div>
                     <div class="w-full h-px bg-blue-100"></div>
                     <div class="flex items-center gap-3">
                       <span class="text-blue-600 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Check In</span>
                       <a href="${day.acc.inLink || '#'}" target="_blank" class="font-bold text-blue-900 hover:text-blue-600 truncate">${day.acc.inName}</a>
                     </div>
                   </div>`;

            contentContainer.innerHTML = `
                <div class="max-w-md mx-auto fade-slide-up">
                    
                    <div class="mb-5 px-2">
                        <h2 class="text-2xl font-extrabold text-slate-900">${day.dateText}</h2>
                        <p class="text-slate-500 font-medium text-sm mt-1 flex items-center gap-2">
                            <span>${day.icon}</span> ${day.country}
                        </p>
                    </div>

                    <div class="bg-white border border-blue-100 rounded-2xl p-4 mb-8 shadow-sm relative overflow-hidden">
                        <div class="absolute right-[-10px] top-[-10px] text-6xl opacity-5">🏨</div>
                        ${topAccHTML}
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 px-5 py-8 mb-6">
                        <ul class="relative border-l-2 border-slate-100 ml-2 space-y-10">
                            ${day.events.map(event => `
                                <li class="relative pl-6">
                                    <div class="absolute left-[-29px] top-1.5 w-3 h-3 rounded-full border-2 border-white shadow-sm box-content ${event.isFood ? 'bg-orange-400 ring-4 ring-orange-50' : 'bg-slate-900 ring-2 ring-slate-100'} z-10"></div>
                                    
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <span class="inline-block px-2.5 py-1 ${event.isFood ? 'bg-orange-50 text-orange-700' : 'bg-slate-100 text-slate-700'} text-xs font-bold rounded shadow-sm">${event.time}</span>
                                        ${event.commute ? `<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wide bg-slate-50 border border-slate-200 px-2 py-1 rounded">${event.commute}</span>` : ''}
                                        ${event.transitNo ? `<span class="text-[10px] font-bold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-1 rounded uppercase tracking-wide">${event.transitNo}</span>` : ''}
                                    </div>
                                    
                                    <div class="mt-2">
                                        ${event.mapLink ? 
                                          `<a href="${event.mapLink}" target="_blank" class="font-bold ${event.isFood ? 'text-orange-900 hover:text-orange-600' : 'text-slate-900 hover:text-blue-600'} text-lg leading-tight flex items-center gap-1.5 group">
                                            ${event.title} 
                                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 ${event.isFood ? 'text-orange-300' : 'text-slate-300'} transition"><path fill-rule="evenodd" d="M9.69 18.933l.003.001C9.89 19.02 10 19 10 19s.11 0 .308-.066l.002-.001.006-.003.018-.008a5.741 5.741 0 00.281-.14c.186-.096.446-.24.757-.433.62-.384 1.445-.966 2.274-1.765C15.302 14.988 17 12.493 17 9A7 7 0 103 9c0 3.492 1.698 5.988 3.355 7.584a13.731 13.731 0 002.273 1.765 11.842 11.842 0 00.976.544l.02.01.006.004zM10 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z" clip-rule="evenodd" /></svg>
                                           </a>` : 
                                          `<p class="font-bold ${event.isFood ? 'text-orange-900' : 'text-slate-900'} text-lg leading-tight">${event.title}</p>`
                                        }
                                        <p class="text-sm text-slate-500 mt-1.5 font-medium leading-relaxed">${event.desc}</p>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <div class="bg-slate-900 rounded-2xl p-5 shadow-md flex items-center gap-4 border border-slate-700">
                        <span class="text-3xl drop-shadow-md">🌙</span>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Night Stay</p>
                            <a href="${day.acc.inLink || '#'}" target="_blank" class="font-bold text-white hover:text-blue-300 leading-tight block truncate">${day.acc.inName}</a>
                        </div>
                    </div>

                </div>
            `;
        }

        renderTabs();

        const totalDays = tripData.days.length;
        const startDate = new Date("2025/11/23"); 
        const today = new Date();
        const differenceInDays = Math.floor((today.getTime() - startDate.getTime()) / (1000 * 3600 * 24));
        
        let progressPercent = 0;
        let dayToShow = 0;

        if (differenceInDays >= 0 && differenceInDays < totalDays) {
            progressPercent = Math.round(((differenceInDays + 1) / totalDays) * 100);
            dayToShow = differenceInDays;
        } else if (today.getTime() > startDate.getTime()) {
            progressPercent = 100;
            dayToShow = totalDays - 1;
        }

        setTimeout(() => {
            document.getElementById('progress-circle').style.strokeDashoffset = 100 - progressPercent;
            document.getElementById('progress-text').innerText = progressPercent + '%';
        }, 100);

        showDay(dayToShow);
        setTimeout(() => document.getElementById(`tab-${dayToShow}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 100);
    </script>
</body>
</html>
