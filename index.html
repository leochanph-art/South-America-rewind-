<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe 2026 Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-slide-up { animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <script>
        // =========================================================================
        // 🛑 EASY EDIT SECTION: Contains May 6 to May 12
        // =========================================================================
        
        const tripData = {
            title: "Europe 2026",
            dates: "May 6 – May 25",
            days: [

                        { time: "06:45", commute: "Walk 🚶", title: "Drop Luggage", desc: "Drop bags at Hub London Marylebone.", mapLink: "https://www.google.com/maps/search/?api=1&query=Hub+by+Premier+Inn+London+Marylebone" },
                        { time: "07:50", commute: "Train 🚆", transitNo: "GWR", title: "Train to Oxford", desc: "Board the GWR Train.", mapLink: "https://www.google.com/maps/search/?api=1&query=Oxford+Station+UK" },
                        { time: "09:15", commute: "Walk 🚶", title: "Radcliffe Camera & Bridge of Sighs", desc: "拍攝牛津經典地標與嘆息橋雙人合照。", mapLink: "https://www.google.com/maps/search/?api=1&query=Radcliffe+Camera+Oxford" },
                        { time: "10:00", title: "Bodleian Library & St Mary's", desc: "登上塔樓俯瞰尖塔天際線。", mapLink: "https://www.google.com/maps/search/?api=1&query=University+Church+of+St+Mary+the+Virgin+Oxford" },
                        { time: "11:30", commute: "Walk 🚶", title: "Covered Market Lunch", desc: "拍攝生活感街拍，品嚐英式肉餡餅。", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Covered+Market+Oxford" },
                        { time: "13:15", title: "Christ Church", desc: "霍格華茲食堂原型，並在 Meadow 拍攝自然風景。", mapLink: "https://www.google.com/maps/search/?api=1&query=Christ+Church+Oxford" },

                    ]

                    },
                    events: [
                        { time: "07:00", commute: "Tube 🚇", title: "Tower Bridge Sunrise Shoot", desc: "Capture clean couple portraits before the commuter rush.", mapLink: "https://www.google.com/maps/search/?api=1&query=Tower+Bridge+London" },
                        { time: "08:30", commute: "Walk 🚶", title: "Borough Market Breakfast", desc: "Walk west along the South Bank for artisan coffee.", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Borough+Market+London" },
                        { time: "10:15", commute: "Tube 🚇", transitNo: "Jubilee Line", title: "Buckingham Palace", desc: "Secure an elevated spot by 10:45 AM for the Guard Change.", mapLink: "https://www.google.com/maps/search/?api=1&query=Victoria+Memorial+Buckingham+Palace+London" },
                        { time: "11:45", commute: "Walk 🚶", title: "St James's Park", desc: "Capture pelicans with the London Eye in the background.", mapLink: "https://www.google.com/maps/search/?api=1&query=St+James%27s+Park+London" },
                        { time: "14:00", commute: "Tube 🚇", title: "Covent Garden Lunch", desc: "Enjoy lunch and dynamic street photography.", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Covent+Garden+London" },
                        { time: "17:00", title: "Luggage Retrieval", desc: "Head back to Hub London Marylebone.", mapLink: "https://www.google.com/maps/search/?api=1&query=Hub+by+Premier+Inn+London+Marylebone" },
                        { time: "18:00", commute: "Cab/Tube 🚕", title: "Transit to Euston / Dinner", desc: "Buy dinner and snacks at Euston Station.", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Euston+Station+London" },
                        { time: "19:30", commute: "Train 🚆", transitNo: "Avanti West Coast", title: "Fast Train to Liverpool", desc: "Board the Avanti West Coast train.", mapLink: "https://www.google.com/maps/search/?api=1&query=Liverpool+Lime+Street+Station" },
                        { time: "22:00", commute: "Taxi 🚕", title: "Arrival in Liverpool", desc: "Lime Street Station. Short taxi to Aparthotel Adagio.", mapLink: "https://www.google.com/maps/search/?api=1&query=Aparthotel+Adagio+Liverpool+City+Centre" }
                    ]
                },
                {
                    tabName: "May 9", dateText: "May 9: Match Day!", country: "UK", icon: "🇬🇧",
                    acc: { 
                        outName: "Aparthotel Adagio (Liverpool)", outLink: "https://www.google.com/maps/search/?api=1&query=Aparthotel+Adagio+Liverpool+City+Centre", 
                        inName: "Manchester Hotel (TBC)", inLink: "https://www.google.com/maps/search/?api=1&query=Manchester+Piccadilly+Station" 
                    },
                    events: [
                        { time: "09:00", commute: "Walk 🚶", title: "Royal Albert Dock Breakfast", desc: "Breakfast and waterfront photography.", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Royal+Albert+Dock+Liverpool" },
                        { time: "11:30", commute: "Bus/Taxi 🚌", title: "Head to Anfield", desc: "Soak in the electric pre-match atmosphere at a local pub.", mapLink: "https://www.google.com/maps/search/?api=1&query=Anfield+Stadium+Liverpool" },
                        { time: "12:30", title: "Pre-Match Lunch", desc: "Grab a pie or pub grub before heading to your seats.", isFood: true },
                        { time: "14:00", title: "Match: Liverpool vs Chelsea", desc: "The main event!", mapLink: "https://www.google.com/maps/search/?api=1&query=Anfield+Stadium+Liverpool" },
                        { time: "18:00", commute: "Train 🚆", transitNo: "Local Rail", title: "Train to Manchester", desc: "Board local train from Liverpool to Manchester.", mapLink: "https://www.google.com/maps/search/?api=1&query=Liverpool+Lime+Street+Station" },
                        { time: "19:45", title: "Manchester Dinner", desc: "Check in and grab a late dinner in the city.", isFood: true, mapLink: "https://www.google.com/maps/search/?api=1&query=Manchester+Piccadilly+Station" }
                    ]
                },
                {
                    tabName: "May 10", dateText: "May 10: Hello, Prague!", country: "UK → CZ", icon: "🇬🇧 / 🇨🇿",
                    acc: { 
                        outName: "Manchester Hotel (TBC)", outLink: "https://www.google.com/maps/search/?api=1&query=Manchester+Piccadilly+Station", 
                        inName: "Prague Hotel (TBC)", inLink: "" 
                    },
                    events: [
                        { time: "Morn", commute: "Train/Taxi 🚕", title: "Transit to MAN", desc: "Morning transit to Manchester Airport.", mapLink: "https://www.google.com/maps/search/?api=1&query=Manchester+Airport" },
                        { time: "12:00", commute: "Flight ✈️", transitNo: "Ryanair", title: "Flight to Prague", desc: "Ryanair Flight to PRG.", mapLink: "https://www.google.com/maps/search/?api=1&query=Vaclav+Havel+Airport+Prague" },
                        { time: "13:30", title: "Airport Lunch", desc: "Grab a quick bite at the airport or upon arrival in Prague.", isFood: true },
                        { time: "15:00", commute: "Walk 🚶", title: "Old Town Square", desc: "Scout locations for evening blue-hour photography.", mapLink: "https://www.google.com/maps/search/?api=1&query=Old+Town+Square+Prague" },
                        { time: "19:00", title: "Czech Welcome Dinner", desc: "Enjoy your first traditional Czech meal and local beer.", isFood: true }
                    ]
                },
                {
                    tabName: "May 11", dateText: "May 11: Charles Bridge", country: "CZ", icon: "🇨🇿",
                    acc: { 
                        outName: "Prague Hotel (TBC)", outLink: "", 
                        inName: "Prague Hotel (TBC)", inLink: "" 
                    },
                    events: [
                        { time: "Dawn", commute: "Walk 🚶", title: "Sunrise Shoot at Charles Bridge", desc: "Perfect light for clean architectural shots and portraits.", mapLink: "https://www.google.com/maps/search/?api=1&query=Charles+Bridge+Prague" },
                        { time: "10:00", title: "Late Breakfast / Brunch", desc: "Relax with a coffee after the early morning shoot.", isFood: true },
                        { time: "Day", commute: "Hike 🥾", title: "Petřín Hill Hike", desc: "Panoramic views of Prague's famous red rooftops.", mapLink: "https://www.google.com/maps/search/?api=1&query=Petrin+Hill+Prague" },
                        { time: "14:00", title: "Late Lunch", desc: "Find a spot with a view after coming down from the hill.", isFood: true },

                    events: [
                        { time: "Day", commute: "Bus 🚌", transitNo: "RegioJet", title: "Český Krumlov", desc: "RegioJet Bus. Incredible river reflections for landscape photography.", mapLink: "https://www.google.com/maps/search/?api=1&query=Cesky+Krumlov" },
                        { time: "13:00", title: "Lunch in Town", desc: "Enjoy lunch in the medieval town center.", isFood: true },
                        { time: "19:00", commute: "Bus 🚌", transitNo: "RegioJet", title: "Dinner / Return", desc: "Dinner either in Český Krumlov before leaving, or back in Prague.", isFood: true }

        // =========================================================================
        // 🛑 DO NOT TOUCH THE CODE BELOW THIS LINE 
        // =========================================================================
    </script>

    <header class="bg-white px-6 pt-12 pb-4 shrink-0 border-b border-slate-200 z-50">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1" id="display-dates"></p>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight" id="display-title"></h1>
            </div>
            <div class="flex flex-col items-center justify-center">
                <div class="relative w-10 h-10">
                    <svg class="w-10 h-10 transform -rotate-90">
                        <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-100" />
                        <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-900 transition-all duration-1000 ease-out" id="progress-circle" stroke-dasharray="100" stroke-dashoffset="100" />
                    </svg>
                    <span class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-900" id="progress-text"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 shrink-0">
        <nav class="flex overflow-x-auto px-4 py-3 space-x-2 no-scrollbar" id="tabs-container"></nav>
    </div>

    <main class="flex-grow px-4 py-6 bg-slate-50 pb-32" id="itinerary-content"></main>

    <script>
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;

        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('itinerary-content');

        function renderTabs() {
            tabsContainer.innerHTML = tripData.days.map((day, index) => `
                <button onclick="showDay(${index})" id="tab-${index}" class="px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all duration-200 flex items-center space-x-2 focus:outline-none border border-transparent">
                    <span class="text-lg">${day.icon}</span>
                    <span>${day.tabName}</span>
                </button>
            `).join('');
        }

        function showDay(dayIndex) {
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) {
                    tab.classList.replace('text-slate-500', 'text-white');
                    tab.classList.add('bg-slate-900', 'shadow-md');
                    tab.classList.remove('hover:bg-slate-200', 'bg-transparent');
                } else {
                    tab.classList.remove('bg-slate-900', 'text-white', 'shadow-md');
                    tab.classList.add('bg-transparent', 'text-slate-500', 'hover:bg-slate-200');
                }
            });

            const day = tripData.days[dayIndex];
            
            // Accommodation Logic
            const isSameHotel = day.acc.outName === day.acc.inName;
            const topAccHTML = isSameHotel 
                ? `<div class="flex items-center gap-3">
                     <span class="text-blue-500 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Stay</span>
                     <a href="${day.acc.inLink}" target="_blank" class="font-bold text-slate-800 hover:text-blue-600 truncate">${day.acc.inName}</a>
                   </div>`
                : `<div class="flex flex-col gap-2.5">
                     <div class="flex items-center gap-3">
                       <span class="text-slate-400 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Check Out</span>
                       <a href="${day.acc.outLink}" target="_blank" class="font-bold text-slate-600 hover:text-blue-600 truncate">${day.acc.outName}</a>
                     </div>
                     <div class="w-full h-px bg-blue-100"></div>
                     <div class="flex items-center gap-3">
                       <span class="text-blue-600 font-bold text-[10px] uppercase w-16 text-right tracking-wider">Check In</span>
                       <a href="${day.acc.inLink}" target="_blank" class="font-bold text-blue-900 hover:text-blue-600 truncate">${day.acc.inName}</a>
                     </div>
                   </div>`;

            contentContainer.innerHTML = `
                <div class="max-w-md mx-auto fade-slide-up">
                    
                    <div class="mb-5 px-2">
                        <h2 class="text-2xl font-extrabold text-slate-900">${day.dateText}</h2>
                        <p class="text-slate-500 font-medium text-sm mt-1 flex items-center gap-2">
                            <span>${day.icon}</span> ${day.country}
                        </p>
                    </div>

                    <div class="bg-white border border-blue-100 rounded-2xl p-4 mb-8 shadow-sm relative overflow-hidden">
                        <div class="absolute right-[-10px] top-[-10px] text-6xl opacity-5">🏨</div>
                        ${topAccHTML}
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 px-5 py-8 mb-6">
                        <ul class="relative border-l-2 border-slate-100 ml-2 space-y-10">
                            ${day.events.map(event => `
                                <li class="relative pl-6">
                                    <div class="absolute left-[-29px] top-1.5 w-3 h-3 rounded-full border-2 border-white shadow-sm box-content ${event.isFood ? 'bg-orange-400 ring-4 ring-orange-50' : 'bg-slate-900 ring-2 ring-slate-100'} z-10"></div>
                                    
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <span class="inline-block px-2.5 py-1 ${event.isFood ? 'bg-orange-50 text-orange-700' : 'bg-slate-100 text-slate-700'} text-xs font-bold rounded shadow-sm">${event.time}</span>
                                        ${event.commute ? `<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wide bg-slate-50 border border-slate-200 px-2 py-1 rounded">${event.commute}</span>` : ''}
                                        ${event.transitNo ? `<span class="text-[10px] font-bold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-1 rounded uppercase tracking-wide">${event.transitNo}</span>` : ''}
                                    </div>
                                    
                                    <div class="mt-2">
                                        ${event.mapLink ? 
                                          `<a href="${event.mapLink}" target="_blank" class="font-bold ${event.isFood ? 'text-orange-900 hover:text-orange-600' : 'text-slate-900 hover:text-blue-600'} text-lg leading-tight flex items-center gap-1.5 group">
                                            ${event.title} 
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 ${event.isFood ? 'text-orange-300' : 'text-slate-300'} transition"><path fill-rule="evenodd" d="M9.69 18.933l.003.001C9.89 19.02 10 19 10 19s.11 0 .308-.066l.002-.001.006-.003.018-.008a5.741 5.741 0 00.281-.14c.186-.096.446-.24.757-.433.62-.384 1.445-.966 2.274-1.765C15.302 14.988 17 12.493 17 9A7 7 0 103 9c0 3.492 1.698 5.988 3.355 7.584a13.731 13.731 0 002.273 1.765 11.842 11.842 0 00.976.544l.02.01.006.004zM10 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z" clip-rule="evenodd" /></svg>
                                           </a>` : 
                                          `<p class="font-bold ${event.isFood ? 'text-orange-900' : 'text-slate-900'} text-lg leading-tight">${event.title}</p>`
                                        }
                                        <p class="text-sm text-slate-500 mt-1.5 font-medium leading-relaxed">${event.desc}</p>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <div class="bg-slate-900 rounded-2xl p-5 shadow-md flex items-center gap-4 border border-slate-700">
                        <span class="text-3xl drop-shadow-md">🌙</span>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Night Stay</p>
                            <a href="${day.acc.inLink}" target="_blank" class="font-bold text-white hover:text-blue-300 leading-tight block truncate">${day.acc.inName}</a>
                        </div>
                    </div>

                </div>
            `;
        }

        renderTabs();

        const totalDays = tripData.days.length;
        const startDate = new Date("2026-05-06");
        const today = new Date();
        const differenceInDays = Math.floor((today.getTime() - startDate.getTime()) / (1000 * 3600 * 24));
        
        let progressPercent = 0;
        let dayToShow = 0;

        if (differenceInDays >= 0 && differenceInDays < totalDays) {
            progressPercent = Math.round(((differenceInDays + 1) / totalDays) * 100);
            dayToShow = differenceInDays;
        } else if (today.getTime() > startDate.getTime()) {
            progressPercent = 100;
            dayToShow = totalDays - 1;
        }

        setTimeout(() => {
            document.getElementById('progress-circle').style.strokeDashoffset = 100 - progressPercent;
            document.getElementById('progress-text').innerText = progressPercent + '%';
        }, 100);

        showDay(dayToShow);
        setTimeout(() => document.getElementById(`tab-${dayToShow}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 100);
    </script>
</body>
</html>
